<form
  id="password-form"
  class="password-form"
  data-target-base="{{ .Get "target" | relURL }}"
>
  <p id="password-message">Please enter the password.</p>

  <input
    type="password"
    id="password"
    class="password-input"
    placeholder="Password"
    autocomplete="current-password"
  >

  <button type="submit" class="button-link">
    Submit
  </button>
</form>

<script src="{{ "js/password-auth.js" | relURL }}"></script>
